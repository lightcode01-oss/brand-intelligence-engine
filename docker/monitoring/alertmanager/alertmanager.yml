global:
  resolve_timeout: 5m
  smtp_from: "alerts@nomen.ai"
  smtp_smarthost: "${SMTP_HOST:-smtp.gmail.com}:587"
  smtp_auth_username: "${SMTP_USERNAME:-}"
  smtp_auth_password: "${SMTP_PASSWORD:-}"
  smtp_require_tls: true

templates:
  - '/etc/alertmanager/templates/*.tmpl'

route:
  group_by: ['alertname', 'severity', 'team']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: 'default-receiver'
  routes:
    - match:
        severity: critical
      receiver: 'critical-alerts'
      group_wait: 10s
      repeat_interval: 1h

    - match:
        severity: warning
      receiver: 'warning-alerts'
      repeat_interval: 6h

receivers:
  - name: 'default-receiver'
    email_configs:
      - to: 'alerts@nomen.ai'
        send_resolved: true

  - name: 'critical-alerts'
    email_configs:
      - to: 'oncall@nomen.ai'
        send_resolved: true
    # Slack webhook (configure SLACK_WEBHOOK_URL env var)
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_URL:-}"
        channel: '#alerts-critical'
        title: '🚨 CRITICAL: {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
        send_resolved: true

  - name: 'warning-alerts'
    email_configs:
      - to: 'platform@nomen.ai'
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']
