# =============================================================================
# Nomen — Prometheus Scrape Configuration
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: production
    region: us-east-1
    app: nomen

# Load alert rules
rule_files:
  - "/etc/prometheus/alerts/*.yml"

# Alertmanager integration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  # ---- Nomen API application metrics ----
  - job_name: "nomen-api"
    metrics_path: "/api/v1/metrics"
    scrape_interval: 15s
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: api
          env: production

  # ---- PostgreSQL metrics ----
  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]
        labels:
          service: postgres
          env: production

  # ---- Redis metrics ----
  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]
        labels:
          service: redis
          env: production

  # ---- Node/Host metrics ----
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          service: host
          env: production

  # ---- Prometheus self-monitoring ----
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          service: prometheus
