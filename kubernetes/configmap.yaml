---
# =============================================================================
# Nomen — ConfigMap (non-secret configuration)
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: nomen-config
  namespace: nomen
  labels:
    app.kubernetes.io/name: nomen
    app.kubernetes.io/managed-by: kubectl
data:
  ENV: "production"
  REDIS_URL: "redis://nomen-redis:6379/0"
  ALLOWED_HOSTS: "nomen.ai,www.nomen.ai,api.nomen.ai"
  CORS_ORIGINS: "https://nomen.ai,https://www.nomen.ai"
  RATE_LIMIT_PER_MINUTE: "60"
  API_PREFIX: "/api"
  API_VERSION: "1.0.0"
