apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nomen-ingress
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: nomen.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nomen-web
                port:
                  number: 3000
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: nomen-api
                port:
                  number: 8000
