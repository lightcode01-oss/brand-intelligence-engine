---
# =============================================================================
# Nomen — API Deployment (Production)
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nomen-api
  namespace: nomen
  labels:
    app.kubernetes.io/name: nomen-api
    app.kubernetes.io/component: backend
    app.kubernetes.io/version: "1.0.0"
  annotations:
    deployment.kubernetes.io/revision: "1"
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: nomen-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nomen-api
        app.kubernetes.io/component: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/api/v1/metrics"
        prometheus.io/port: "8000"
    spec:
      serviceAccountName: nomen-api
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: api
          image: ghcr.io/your-org/nomen-api:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP

          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"

          env:
            - name: ENV
              value: "production"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: nomen-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: nomen-config
                  key: REDIS_URL
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: nomen-secrets
                  key: SECRET_KEY
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: nomen-secrets
                  key: GEMINI_API_KEY
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: nomen-secrets
                  key: OPENAI_API_KEY
                  optional: true
            - name: ALLOWED_HOSTS
              valueFrom:
                configMapKeyRef:
                  name: nomen-config
                  key: ALLOWED_HOSTS
            - name: CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: nomen-config
                  key: CORS_ORIGINS

          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
            successThreshold: 1
            timeoutSeconds: 5

          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
            timeoutSeconds: 10

          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 24
            timeoutSeconds: 10

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          volumeMounts:
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: tmp
          emptyDir: {}

---
# =============================================================================
# Nomen — API Service
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: nomen-api
  namespace: nomen
  labels:
    app.kubernetes.io/name: nomen-api
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: nomen-api
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP

---
# =============================================================================
# Nomen — API ServiceAccount
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nomen-api
  namespace: nomen
  labels:
    app.kubernetes.io/name: nomen-api
automountServiceAccountToken: false
