apiVersion: apps/v1
kind: Deployment
metadata:
  name: nomen-api
  namespace: default
  labels:
    app: nomen-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nomen-api
  template:
    metadata:
      labels:
        app: nomen-api
    spec:
      containers:
        - name: api
          image: lightcode01/nomen-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          env:
            - name: ENV
              valueFrom:
                configMapKeyRef:
                  name: nomen-config
                  key: ENV
            - name: DATABASE_URL
              value: "postgresql+asyncpg://$(DB_USER):$(DB_PASSWORD)@$(DATABASE_HOST):$(DATABASE_PORT)/$(DATABASE_DB)"
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: nomen-config
                  key: REDIS_URL
            - name: DATABASE_HOST
              valueFrom:
                configMapKeyRef:
                  name: nomen-config
                  key: DATABASE_HOST
            - name: DATABASE_PORT
              valueFrom:
                configMapKeyRef:
                  name: nomen-config
                  key: DATABASE_PORT
            - name: DATABASE_DB
              valueFrom:
                configMapKeyRef:
                  name: nomen-config
                  key: DATABASE_DB
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: nomen-secrets
                  key: DATABASE_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nomen-secrets
                  key: DATABASE_PASSWORD
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: nomen-secrets
                  key: SECRET_KEY
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: nomen-secrets
                  key: GEMINI_API_KEY
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: nomen-api
  namespace: default
spec:
  ports:
    - port: 8000
      targetPort: 8000
  selector:
    app: nomen-api
  type: ClusterIP
