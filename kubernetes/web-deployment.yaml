apiVersion: apps/v1
kind: Deployment
metadata:
  name: nomen-web
  namespace: default
  labels:
    app: nomen-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nomen-web
  template:
    metadata:
      labels:
        app: nomen-web
    spec:
      containers:
        - name: web
          image: lightcode01/nomen-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          env:
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: nomen-config
                  key: NEXT_PUBLIC_API_URL
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: nomen-web
  namespace: default
spec:
  ports:
    - port: 3000
      targetPort: 3000
  selector:
    app: nomen-web
  type: ClusterIP
