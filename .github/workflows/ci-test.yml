name: Unit and Integration Testing

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  run-tests:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: ankane/pgvector:v0.5.1
        env:
          POSTGRES_USER: nomen_user
          POSTGRES_PASSWORD: supersecretpassword
          POSTGRES_DB: nomen_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Frontend tests setup
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Node Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Web Testing (Vitest Placeholder)
        run: |
          if pnpm --filter web run test --help &> /dev/null; then
            pnpm --filter web test
          else
            echo "No test script found in web"
          fi

      # Backend tests setup
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python Dependencies
        run: |
          pip install -r apps/api/requirements.txt || echo "No requirements file yet"
          pip install pytest pytest-asyncio pytest-cov

      - name: Run Backend Testing
        env:
          DATABASE_URL: postgresql+asyncpg://nomen_user:supersecretpassword@localhost:5432/nomen_db
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: testsecretkeyvalue
          ENV: testing
        run: |
          if [ -d "apps/api/tests" ]; then
            pytest apps/api/tests/ --cov=apps/api/app --cov-report=xml
          else
            echo "No api tests folder found"
          fi
